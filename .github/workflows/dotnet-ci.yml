name: .NET CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -warnaserror --no-restore --configuration Release

    - name: Run tests with coverage
      run: dotnet test CalculatorTestProject/CalculatorTestProject.csproj --configuration Release --no-build --collect:"XPlat Code Coverage" --logger "trx;LogFileName=test-results.trx"

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate coverage report
      shell: pwsh
      run: |
        reportgenerator `
          -reports:**/coverage.cobertura.xml `
          -targetdir:coveragereport `
          -reporttypes:HtmlSummary

    - name: Upload test and coverage artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-and-coverage
        path: |
          **/*.trx
          coveragereport/**
